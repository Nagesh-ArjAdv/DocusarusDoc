<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f97316"/>
    </marker>
    <style>
      .bg-rect     { fill: none; stroke: #d1d5db; }
      .label-sub   { fill: #6b7280; }
      .label-title { fill: #111827; }
      .icon-label  { fill: #111827; }
      .pill-bg     { fill: #fff7ed; stroke: #f97316; }
      .pill-text   { fill: #c2410c; }
      .dh-text     { fill: #2563eb; }

      @media (prefers-color-scheme: dark) {
        .bg-rect     { fill: none; stroke: #4b5563; }
        .label-sub   { fill: #9ca3af; }
        .label-title { fill: #f9fafb; }
        .icon-label  { fill: #f9fafb; }
        .pill-bg     { fill: #431407; stroke: #f97316; }
        .pill-text   { fill: #fdba74; }
        .dh-text     { fill: #60a5fa; }
      }
    </style>
  </defs>

  <!-- Left box -->
  <rect x="50" y="50" width="280" height="250" rx="12" stroke-width="2" class="bg-rect"/>
  <text x="65" y="80" font-size="14" font-weight="600" class="label-sub">Provider</text>
  <text x="65" y="100" font-size="18" font-weight="700" class="label-title">SFTP</text>

  <!-- Left icon -->
  
  <g transform="translate(190, 175)">
    <rect x="-50" y="-45" width="100" height="80" rx="10" fill="#0e7490"/>
    <rect x="-50" y="-45" width="100" height="26" rx="10" fill="#22d3ee"/>
    <rect x="-50" y="-32" width="100" height="13" fill="#22d3ee"/>
    <circle cx="-32" cy="-32" r="5" fill="#ef4444"/>
    <circle cx="-16" cy="-32" r="5" fill="#fbbf24"/>
    <circle cx="0" cy="-32" r="5" fill="#22c55e"/>
    <rect x="-36" y="-8" width="72" height="9" rx="3" fill="#164e63"/>
    <rect x="-36" y="8" width="72" height="9" rx="3" fill="#164e63"/>
    <rect x="-36" y="24" width="72" height="9" rx="3" fill="#164e63"/>
  </g>
  <text x="190" y="255" font-size="15" font-weight="700" text-anchor="middle" class="icon-label">SFTP</text>


  <!-- Arrow -->
  <line x1="340" y1="175" x2="458" y2="175" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="352" y="148" width="148" height="36" rx="6" stroke-width="1.5" class="pill-bg"/>
  <text x="426" y="171" font-size="13" font-weight="600" text-anchor="middle" class="pill-text">Grant read access</text>

  <!-- Right box -->
  <rect x="470" y="50" width="280" height="250" rx="12" stroke-width="2" class="bg-rect"/>
  <text x="485" y="80" font-size="14" font-weight="600" class="dh-text">DeliveryHub</text>
  <text x="485" y="100" font-size="18" font-weight="700" class="label-title">Sharing platform</text>

  <!-- DeliveryHub icon -->
  <g transform="translate(610, 170)">
    <circle cx="-20" cy="-15" r="18" fill="#2563eb"/>
    <circle cx="20" cy="-15" r="18" fill="#2563eb"/>
    <circle cx="0" cy="15" r="18" fill="#1d4ed8"/>
    <text x="0" y="22" font-size="20" font-weight="bold" fill="white" text-anchor="middle">D</text>
  </g>
  <text x="610" y="268" font-size="16" font-weight="700" text-anchor="middle" class="dh-text">deliveryhub</text>
</svg>